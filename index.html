<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Card flip game</title>    
    </head>
    <style>
        body{
            padding-top: 40px;
            padding-left: 45px;
        }
        .card-holder{
            width: 950px;
            height: 500px;
            display: flex;
            flex-wrap: wrap;
        }
        .card{
            width: 140px;
            height: 185px;
            background-image: url(card.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 2.5px solid #A4987E;
            margin: 15px;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            cursor: pointer;
        }
    </style>
    <body>

        <div class="card-holder">
        <div class="card" id="1"></div>
        <div class="card" id="2"></div>
        <div class="card" id="3"></div>      
        <div class="card" id="4"></div>
        <div class="card" id="5"></div>
        <div class="card" id="6"></div>
        <div class="card" id="7"></div>
        <div class="card" id="8"></div>
        <div class="card" id="9"></div>
        <div class="card" id="10"></div>
        </div>
    </body>
</html>
