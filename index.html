<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Card flip game</title>    
    </head>
    <style>
        body{
            padding-top: 40px;
            padding-left: 45px;
            background-color: #F4EBD0;
        }
        .cards{
            width: 950px;
            height: 500px;
            display: flex;
            flex-wrap: wrap;
            margin-left:270px;
        }
        .card{
            width: 140px;
            height: 185px;
            background-image: url(card.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 2.5px solid #A4987E;
            margin: 15px;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            
        }
    
</style>
<body>
        <h3 style="margin-bottom: 0px;margin-top:-30px;margin-left:650px;">Memory game</h3>
        <div class="cards">
        <div class="card" id="1"></div>
        <div class="card" id="2"></div>
        <div class="card" id="3"></div>      
        <div class="card" id="4"></div>
        <div class="card" id="5"></div>
        <div class="card" id="6"></div>
        <div class="card" id="7"></div>
        <div style="background-color: #F4EBD0;margin:15px;height: 185px;width:140px;width:140px;"></div>
        <div class="card" id="8"></div>
        <div class="card" id="9"></div>
        <div class="card" id="10"></div>
        <div class="card" id="11"></div>
        <div class="card" id="12"></div>
        <div class="card" id="13"></div>
        <div class="card" id="14"></div>
        </div>
        <button style="visibility:hidden;" class="btn">Retry</button>
    <script>
            function random(){
                let x=Math.floor(Math.random() * 14) + 1;
                if(temp.includes(x)){
                    return random();
                }
                temp.push(x);
                return x;
            }
            function checks(){
                if(turns.length===2){
                    if(a[turns[0]-1][1]==a[turns[1]-1][1]){
                        pairs.push(turns[0]);
                        pairs.push(turns[1]);
                    }else{
                        let a1=document.getElementById(String(turns[0]));
                        let a2=document.getElementById(String(turns[1]));
                        setTimeout(function(){
                            a1.style.backgroundImage='url("card.jpg")';
                            a2.style.backgroundImage='url("card.jpg")';
                        },600);
                    }
                    turns.pop();
                    turns.pop();
                    if(pairs.length===14){
                        let btn=document.querySelectorAll()
                    }
                }
            }
            let a=[],temp=[],pairs=[],turns=[];
            for(let i=0;i<=13;i++){
                a[i]=[];
                a[i][0]=i+1;
                a[i][1]=random()%7+1;
            }
            let a1=document.querySelectorAll(".card");
            a1.forEach((cards)=>{
                cards.addEventListener("click", function() {
                    let ab=Number(cards.getAttribute("id"));
                    if(!pairs.includes(ab)){
                        turns.push(ab);
                        let ac=document.getElementById(cards.getAttribute("id"));
                        let ad='img/'+a[ab-1][1]+'.jpg';
                        ac.style.backgroundImage = `url("${ad}")`;
                        checks();
                    }
                })
            });
    </script>
</body>
</html>
